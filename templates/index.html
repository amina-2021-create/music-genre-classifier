<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicGenre AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #08080f;
      --surface: #10101e;
      --surface2: #181828;
      --accent: #7f77dd;
      --accent2: #9fe1cb;
      --text: #e8e6f0;
      --muted: #6e6c80;
      --border: rgba(127, 119, 221, .18);
      --error: #f09595;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(127, 119, 221, .08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(159, 225, 203, .05) 0%, transparent 55%);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp .6s ease both;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      letter-spacing: .12em;
      color: var(--accent);
      margin-bottom: 10px;
      opacity: .8;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: -.02em;
      line-height: 1.15;
    }

    h1 em {
      font-style: normal;
      color: var(--accent2);
    }

    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-top: 10px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 540px;
      animation: fadeUp .6s .1s ease both;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 0;
    }

    .url-input {
      flex: 1;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }

    .url-input::placeholder {
      color: var(--muted);
    }

    .url-input:focus {
      border-color: var(--accent);
    }

    .btn {
      padding: 13px 22px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      background: #534ab7;
    }

    .btn:active:not(:disabled) {
      transform: scale(.97);
    }

    .btn:disabled {
      background: #2a2a3a;
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ── States ── */
    .state {
      margin-top: 28px;
      display: none;
    }

    .state.active {
      display: block;
    }

    /* loading */
    .loading-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 0;
    }

    .spinner {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      border: 2.5px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .loading-text {
      color: var(--muted);
      font-size: .9rem;
    }

    .loading-text span {
      color: var(--text);
      font-weight: 500;
    }

    /* result */
    .result-top {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .emoji-bubble {
      width: 58px;
      height: 58px;
      flex-shrink: 0;
      background: var(--surface2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .result-label {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .result-genre {
      font-family: 'Space Mono', monospace;
      font-size: 1.7rem;
      color: var(--accent2);
      letter-spacing: -.01em;
    }

    .result-title {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    /* top 3 */
    .top3-label {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .bar-name {
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
      width: 72px;
      color: var(--text);
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width .8s cubic-bezier(.16, 1, .3, 1);
      width: 0;
    }

    .bar-fill.second {
      background: var(--accent2);
      opacity: .6;
    }

    .bar-fill.third {
      background: var(--muted);
      opacity: .5;
    }

    .bar-pct {
      font-size: .78rem;
      color: var(--muted);
      width: 40px;
      text-align: right;
    }

    /* error */
    .error-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(240, 149, 149, .07);
      border: 1px solid rgba(240, 149, 149, .2);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 20px;
      color: var(--error);
      font-size: .88rem;
    }

    .error-icon {
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Animations ── */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.94);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .result-top {
      animation: popIn .4s ease both;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">▶ MUSICGENRE </div>
    <h1>Quel genre écoutes-<em>tu</em>&nbsp;?</h1>
    <p class="subtitle">Colle un lien YouTube — le modèle identifie le genre en quelques secondes</p>
  </div>

  <div class="card">
    <div class="input-row">
      <input class="url-input" id="url-input" type="text" placeholder="https://youtube.com/watch?v=...">
      <button class="btn" id="btn" onclick="predict()">Analyser →</button>
    </div>

    <!-- Loading -->
    <div class="state" id="state-loading">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Téléchargement en cours…</div>
      </div>
    </div>

    <!-- Result -->
    <div class="state" id="state-result">
      <div class="result-top">
        <div class="emoji-bubble" id="res-emoji">🎵</div>
        <div>
          <div class="result-label">Genre détecté</div>
          <div class="result-genre" id="res-genre">—</div>
          <div class="result-title" id="res-title"></div>
        </div>
      </div>
      <div class="top3-label">Probabilités top 3</div>
      <div id="bars"></div>
    </div>

    <!-- Error -->
    <div class="state" id="state-error">
      <div class="error-box">
        <span class="error-icon">⚠</span>
        <span id="error-msg"></span>
      </div>
    </div>
  </div>

  <script>
    const states = ["loading", "result", "error"];

    function showState(name) {
      states.forEach(s => {
        const el = document.getElementById(`state-${s}`);
        el.classList.toggle("active", s === name);
      });
    }

    function hideAll() {
      states.forEach(s => document.getElementById(`state-${s}`).classList.remove("active"));
    }

    async function predict() {
      const url = document.getElementById("url-input").value.trim();
      if (!url) { document.getElementById("url-input").focus(); return; }

      document.getElementById("btn").disabled = true;
      document.getElementById("loading-text").innerHTML =
        "Téléchargement &amp; analyse en cours…";
      showState("loading");

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (data.error) {
          document.getElementById("error-msg").textContent = data.error;
          showState("error");
          return;
        }

        // Remplir résultat
        document.getElementById("res-emoji").textContent = data.emoji || "🎵";
        document.getElementById("res-genre").textContent = data.genre.toUpperCase();
        document.getElementById("res-title").textContent = data.title || "";

        // Barres top-3
        const barsEl = document.getElementById("bars");
        barsEl.innerHTML = "";
        (data.top3 || []).forEach((item, i) => {
          const cls = ["", "second", "third"][i] || "";
          barsEl.innerHTML += `
            <div class="bar-row">
              <span class="bar-name">${item.genre}</span>
              <div class="bar-track">
                <div class="bar-fill ${cls}" data-pct="${item.confidence}"></div>
              </div>
              <span class="bar-pct">${item.confidence}%</span>
            </div>`;
        });

        showState("result");

        // Animer les barres après insertion
        requestAnimationFrame(() => {
          document.querySelectorAll(".bar-fill").forEach(el => {
            el.style.width = el.dataset.pct + "%";
          });
        });

      } catch (e) {
        document.getElementById("error-msg").textContent = "Erreur réseau — vérifie que le serveur tourne.";
        showState("error");
      } finally {
        document.getElementById("btn").disabled = false;
      }
    }

    document.getElementById("url-input").addEventListener("keydown", e => {
      if (e.key === "Enter") predict();
    });
  </script>
</body>

</html>
